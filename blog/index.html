<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Magami Open Sciences Initiative</title>
<meta name="description" content="Stories, research highlights, and technical insights from the Magami OS team.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
.blog-header{padding:180px 0 0}
.blog-header h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(36px,4.5vw,56px);line-height:1;letter-spacing:-.03em;font-variation-settings:'SOFT'80;margin-bottom:16px}
.blog-header p{color:var(--text-secondary);font-weight:300;max-width:480px;font-size:clamp(15px,1.05vw,16px);line-height:1.7}
.blog-grid{margin-top:8vh;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:40px;padding-bottom:14vh}
.blog-card{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:2px;transition:border-color .3s,transform .3s;background:var(--surface)}
.blog-card:hover{border-color:var(--accent);transform:translateY(-4px)}
.blog-card-image{width:100%;height:200px;object-fit:cover;border-bottom:1px solid var(--border)}
.blog-card-body{padding:28px;flex:1;display:flex;flex-direction:column}
.blog-card-meta{display:flex;gap:16px;font-family:'JetBrains Mono',monospace;font-size:clamp(9px,0.6vw,10px);letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
.blog-card h3{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(18px,1.4vw,22px);letter-spacing:-.02em;margin-bottom:10px;font-variation-settings:'SOFT'80;line-height:1.2}
.blog-card p{color:var(--text-secondary);font-weight:300;font-size:clamp(13px,0.85vw,14px);line-height:1.65;flex:1;margin-bottom:20px}
@media(max-width:600px){
  .blog-grid{grid-template-columns:1fr;gap:24px}
}
</style>
</head>
<body>

<header id="header">
  <div class="container">
    <a href="../" class="logo">Magami<span>OS</span></a>
    <div class="header-right">
      <ul class="header-nav">
        <li><a href="../">Home</a></li>
        <li><a href="../#about">About</a></li>
      </ul>
      <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">&#9790;</button>
    </div>
  </div>
</header>

<div class="mol-bg mol-light">
  <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" opacity="0.035">
    <defs>
      <pattern id="hex-bl" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
        <path d="M30 0 L60 17 L60 35 L30 52 L0 35 L0 17 Z" fill="none" stroke="#1a1a18" stroke-width="0.6"/>
        <circle cx="30" cy="0" r="1" fill="#1a1a18"/>
        <circle cx="0" cy="17" r="1" fill="#1a1a18"/>
        <circle cx="60" cy="35" r="1" fill="#1a1a18"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hex-bl)"/>
  </svg>
</div>
<div class="mol-bg mol-dark">
  <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" opacity="0.05">
    <defs>
      <pattern id="hex-bd" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
        <path d="M30 0 L60 17 L60 35 L30 52 L0 35 L0 17 Z" fill="none" stroke="#e8e3dd" stroke-width="0.5"/>
        <circle cx="30" cy="0" r="1" fill="#e8e3dd"/>
        <circle cx="0" cy="17" r="1" fill="#e8e3dd"/>
        <circle cx="60" cy="35" r="1" fill="#e8e3dd"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hex-bd)"/>
  </svg>
</div>

<div class="container blog-header">
  <div class="section-label">Blog</div>
  <h1>Updates &amp; insights</h1>
  <p>Stories, research highlights, and technical insights from the Magami OS team.</p>
</div>

<section class="container blog-grid" id="blog-grid">
</section>

<hr>

<footer>
  <div class="container">
    <div class="logo" style="font-size:1rem">Magami<span>OS</span></div>
    <div class="copy">&copy; 2026 Magami Open Sciences Initiative</div>
    <ul class="foot-nav">
      <li><a href="mailto:hello@magamios.org">Email</a></li>
      <li><a href="https://magamios.org" target="_blank">Website</a></li>
    </ul>
  </div>
</footer>

<script src="../script.js"></script>
<script>
var base = window.location.pathname;
base = base.substring(0, base.lastIndexOf('/') + 1);

fetch(base + 'posts/posts.json')
  .then(function(r) { return r.json(); })
  .then(function(posts) {
    var grid = document.getElementById('blog-grid');
    posts.forEach(function(post, i) {
      var dateObj = post.date ? new Date(post.date) : null;
      var formatted = dateObj ? dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
      var card = document.createElement('article');
      card.className = 'blog-card';
      card.innerHTML = [
        '<div class="blog-card-body">',
        '<div class="blog-card-meta">',
        formatted ? '<span>' + formatted + '</span>' : '',
        '</div>',
        '<h3>' + post.title + '</h3>',
        '<p>' + post.excerpt + '</p>',
        '<a href="post.html?slug=' + post.slug + '" class="blog-card-link">Read more <span class="arrow">&rarr;</span></a>',
        '</div>'
      ].join('');
      grid.appendChild(card);
    });
  })
  .catch(function() {
    document.getElementById('blog-grid').innerHTML = '<div style="padding:4vh 0;color:var(--text-muted)">No posts yet.</div>';
  });
</script>
</body>
</html>
