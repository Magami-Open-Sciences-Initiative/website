<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading... — Magami OS</title>
<meta name="description" content="Blog post from Magami OS.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
.post-header{padding:180px 0 0}
.post-back{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:clamp(10px,0.65vw,11px);letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4vh;transition:color .3s}
.post-back:hover{color:var(--accent)}
.post-back .arr{transition:transform .3s;display:inline-block}
.post-back:hover .arr{transform:translateX(-4px)}
.post-header h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(30px,4vw,48px);line-height:1.04;letter-spacing:-.03em;max-width:800px;font-variation-settings:'SOFT'80;margin-bottom:20px}
.post-meta{display:flex;gap:20px;font-family:'JetBrains Mono',monospace;font-size:clamp(10px,0.65vw,11px);letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6vh;flex-wrap:wrap}

.post-content{max-width:720px;margin:0 auto;padding:6vh 0 14vh}
.post-content h2{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(24px,2.4vw,32px);letter-spacing:-.02em;margin:6vh 0 2vh;font-variation-settings:'SOFT'80;line-height:1.1}
.post-content h3{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(18px,1.6vw,22px);letter-spacing:-.02em;margin:5vh 0 1.5vh;font-variation-settings:'SOFT'80;line-height:1.1}
.post-content h4{font-family:'Fraunces',serif;font-weight:500;font-size:1rem;letter-spacing:-.01em;margin:4vh 0 1vh}
.post-content p{margin-bottom:1.8em;color:var(--text-secondary);font-weight:300;line-height:1.75;font-size:clamp(15px,1.05vw,17px)}
.post-content strong{color:var(--text);font-weight:500}
.post-content em{font-style:italic}
.post-content a{color:var(--accent);border-bottom:1px solid transparent;transition:border-color .3s}
.post-content a:hover{border-color:var(--accent)}
.post-content ul,.post-content ol{padding-left:1.5em;margin-bottom:1.8em;color:var(--text-secondary);font-weight:300;line-height:1.75;font-size:clamp(15px,1.05vw,17px)}
.post-content li{margin-bottom:.4em}
.post-content blockquote{border-left:2px solid var(--accent);padding:1.5em 2em;margin:4vh 0;background:var(--accent-light);color:var(--text);font-weight:400;font-size:clamp(16px,1.1vw,18px);line-height:1.6;font-style:italic}
.post-content blockquote p{margin-bottom:0;color:var(--text);font-weight:400}
.post-content code{font-family:'JetBrains Mono',monospace;font-size:.85em;background:var(--primary-light);padding:2px 8px;border-radius:2px;color:var(--text)}
.post-content pre{background:var(--surface);border:1px solid var(--border);padding:24px;overflow-x:auto;margin:4vh 0;border-radius:2px}
.post-content pre code{background:none;padding:0;font-size:clamp(12px,0.8vw,13px);line-height:1.6;color:var(--text-secondary)}
.post-content table{width:100%;border-collapse:collapse;margin:4vh 0;font-size:clamp(13px,0.85vw,14px)}
.post-content th,.post-content td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);font-weight:300}
.post-content th{font-family:'JetBrains Mono',monospace;font-size:clamp(10px,0.65vw,11px);letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);font-weight:400}
.post-content td{color:var(--text-secondary)}
.post-content hr{border:none;border-top:1px solid var(--rule);margin:6vh 0}
.post-content img{width:100%;border-radius:2px;margin:4vh 0;border:1px solid var(--border)}
.post-error{text-align:center;padding:10vh 0;color:var(--text-muted)}
.post-loading{text-align:center;padding:10vh 0;color:var(--text-secondary);font-family:'Fraunces',serif;font-weight:400;font-size:1.2rem;letter-spacing:-.02em;font-variation-settings:'SOFT'80}
</style>
</head>
<body>

<header id="header">
  <div class="container">
    <a href="../" class="logo">Magami<span>OS</span></a>
    <div class="header-right">
      <ul class="header-nav">
        <li><a href="../">Home</a></li>
        <li><a href="index.html">Blog</a></li>
      </ul>
      <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">&#9790;</button>
    </div>
  </div>
</header>

<div class="mol-bg mol-light">
  <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" opacity="0.035">
    <defs>
      <pattern id="hex-pl" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
        <path d="M30 0 L60 17 L60 35 L30 52 L0 35 L0 17 Z" fill="none" stroke="#1a1a18" stroke-width="0.6"/>
        <circle cx="30" cy="0" r="1" fill="#1a1a18"/>
        <circle cx="0" cy="17" r="1" fill="#1a1a18"/>
        <circle cx="60" cy="35" r="1" fill="#1a1a18"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hex-pl)"/>
  </svg>
</div>
<div class="mol-bg mol-dark">
  <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" opacity="0.05">
    <defs>
      <pattern id="hex-pd" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
        <path d="M30 0 L60 17 L60 35 L30 52 L0 35 L0 17 Z" fill="none" stroke="#e8e3dd" stroke-width="0.5"/>
        <circle cx="30" cy="0" r="1" fill="#e8e3dd"/>
        <circle cx="0" cy="17" r="1" fill="#e8e3dd"/>
        <circle cx="60" cy="35" r="1" fill="#e8e3dd"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hex-pd)"/>
  </svg>
</div>

<article>
  <div class="container">
    <div class="post-header">
      <a href="index.html" class="post-back"><span class="arr">&larr;</span> Back to blog</a>
      <div id="post-header-content">
        <div class="post-loading">Loading post...</div>
      </div>
    </div>
  </div>
  <div class="container post-content" id="post-content">
    <div class="post-loading">Loading post...</div>
  </div>
</article>

<hr>

<footer>
  <div class="container">
    <div class="logo" style="font-size:1rem">Magami<span>OS</span></div>
    <div class="copy">&copy; 2026 Magami Open Sciences Initiative</div>
    <ul class="foot-nav">
      <li><a href="mailto:hello@magamios.org">Email</a></li>
      <li><a href="https://magamios.org" target="_blank">Website</a></li>
    </ul>
  </div>
</footer>

<script src="../script.js"></script>
<script>
(function() {
  var slug = new URLSearchParams(window.location.search).get('slug');
  var headerEl = document.getElementById('post-header-content');
  var contentEl = document.getElementById('post-content');

  function showError(msg) {
    headerEl.innerHTML = '<div class="post-error">' + msg + '</div>';
    contentEl.innerHTML = '<div class="post-error">The post could not be loaded. <a href="index.html" style="color:var(--accent);border-bottom:1px solid var(--accent)">Back to blog</a></div>';
  }

  if (!slug) {
    showError('No post specified.');
  } else {
    var base = window.location.pathname;
    base = base.substring(0, base.lastIndexOf('/') + 1);
    var mdUrl = base + 'posts/' + slug + '.md';

    fetch(mdUrl)
      .then(function(r) {
        if (!r.ok) throw new Error('Not found (HTTP ' + r.status + ')');
        return r.text();
      })
      .then(function(md) {
        var frontmatter = {};
        var body = md;
        if (md.startsWith('---')) {
          var end = md.indexOf('---', 3);
          if (end !== -1) {
            var fm = md.slice(3, end).trim();
            fm.split('\n').forEach(function(line) {
              var colon = line.indexOf(':');
              if (colon > 0) {
                var key = line.slice(0, colon).trim();
                var val = line.slice(colon + 1).trim();
                frontmatter[key] = val;
              }
            });
            body = md.slice(end + 3).trim();
          }
        }

        var dateStr = frontmatter.date || '';
        var dateObj = dateStr ? new Date(dateStr) : null;
        var formatted = dateObj ? dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';

        document.title = (frontmatter.title || slug) + ' — Magami OS';
        document.querySelector('meta[name="description"]').content = frontmatter.excerpt || '';

        headerEl.innerHTML =
          '<h1>' + (frontmatter.title || slug) + '</h1>' +
          '<div class="post-meta">' +
          (formatted ? '<span>' + formatted + '</span>' : '') +
          (frontmatter.author ? '<span>' + frontmatter.author + '</span>' : '') +
          '</div>';

        var html;
        if (typeof marked !== 'undefined' && typeof marked.parse === 'function') {
          html = marked.parse(body, { breaks: true });
        } else {
          html = body.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }
        contentEl.innerHTML = html;
      })
      .catch(function(err) {
        showError('Post not found.');
      });
  }
})();
</script>
</body>
</html>
